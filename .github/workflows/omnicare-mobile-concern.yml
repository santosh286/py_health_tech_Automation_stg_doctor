name: OmniCare Mobile Concern Test

on:
  schedule:
    - cron: '30 5 * * *' # 11:00 AM IST (UTC+5:30) = 05:30 UTC
  push:
    branches: [main]
    paths:
      - 'tests/omnicare_flow/mobile_concern.spec.js'
  pull_request:
    branches: [main]
    paths:
      - 'tests/omnicare_flow/mobile_concern.spec.js'
  workflow_dispatch: # allows manual trigger from GitHub UI

jobs:
  test:
    name: Run mobile_concern.spec.js
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run OmniCare mobile concern test
        run: npx playwright test tests/omnicare_flow/mobile_concern.spec.js --reporter=line

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results/
          retention-days: 7

      - name: Upload failure screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-screenshots
          path: test-results/screenshots/
          retention-days: 7
